services:
  brain:
    image: kitchencoder/second-brain:latest
    container_name: brain
    volumes:
      # BRAIN_HOST_PATH must be set in the shell environment before running
      # docker compose — it is not reliably read from .env across all platforms.
      # Set it explicitly: export BRAIN_HOST_PATH=~/Documents/brain
      - ${BRAIN_HOST_PATH}:/brain
    env_file:
      # Passes container environment variables (EMBEDDING_*, CHAT_*, etc.)
      # into the running container. BRAIN_HOST_PATH is also present in this
      # file but is not used by the container — it only serves the line above.
      - .env
    ports:
      - "${BRAIN_API_PORT:-7779}:7779"
    stdin_open: true
    tty: true
    restart: unless-stopped

  code-server:
    build: ./code-server
    container_name: brain-ui
    volumes:
      - ${BRAIN_HOST_PATH}:/brain
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "${CODE_SERVER_PORT:-8080}:8080"
    restart: unless-stopped
    command: --auth none /brain
