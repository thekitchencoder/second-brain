services:
  brain:
    image: kitchencoder/second-brain:latest
    container_name: brain
    volumes:
      # BRAIN_HOST_PATH is resolved from .env by Docker Compose at parse time
      # (automatic YAML interpolation — separate from env_file below).
      - ${BRAIN_HOST_PATH:-~/Documents/Vault33}:/brain
    env_file:
      # Passes container environment variables (EMBEDDING_*, CHAT_*, etc.)
      # into the running container. BRAIN_HOST_PATH is also present in this
      # file but is not used by the container — it only serves the line above.
      - .env
    stdin_open: true
    tty: true
    restart: unless-stopped
